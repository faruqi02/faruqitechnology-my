<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="public/favicon.png">
    <title>Task Manager Page</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <style>
        /* THEME VARIABLES */
        :root {
            --canvas-size: 30000px;
            --grid-size: 40px;
            --bg-color: #f0f2f5;
            --grid-color: rgba(28, 42, 62, 0.08);
            --grid-major-color: rgba(28, 42, 62, 0.16);
            --grid-glow: rgba(0, 123, 255, 0.08);
            --toolbar-bg: rgba(255, 255, 255, 0.9);
            --card-bg: #ffffff;
            --text-main: #222222;
            --text-sub: #444444;
            --border-color: #cccccc;
            --primary-btn: #222222;
            --shadow: rgba(0, 0, 0, 0.1);
            --accent: #007bff;
            --danger: #ff4d4d;
        }

        [data-theme="dark"] {
            --bg-color: #1a1a1b;
            --grid-color: rgba(255, 255, 255, 0.06);
            --grid-major-color: rgba(255, 255, 255, 0.12);
            --grid-glow: rgba(0, 123, 255, 0.12);
            --toolbar-bg: rgba(30, 30, 31, 0.9);
            --card-bg: #2d2d2e;
            --text-main: #e1e1e1;
            --text-sub: #b1b1b1;
            --border-color: #444444;
            --primary-btn: #444444;
            --shadow: rgba(0, 0, 0, 0.4);
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            background-color: var(--bg-color);
            min-height: 100vh;
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
            overflow: hidden;
            touch-action: none;
        }

        #canvas-stage {
            --minor-grid-size: 40px;
            --major-grid-size: 200px;
            --minor-offset-x: 0px;
            --minor-offset-y: 0px;
            --major-offset-x: 0px;
            --major-offset-y: 0px;
            position: fixed;
            inset: 0;
            overflow: hidden;
            cursor: default;
            background-color: var(--bg-color);
            background-image:
                linear-gradient(var(--grid-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-color) 1px, transparent 1px),
                linear-gradient(var(--grid-major-color) 1px, transparent 1px),
                linear-gradient(90deg, var(--grid-major-color) 1px, transparent 1px),
                radial-gradient(circle at 18% 12%, var(--grid-glow), transparent 28%),
                radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.04), transparent 24%);
            background-size:
                var(--minor-grid-size) var(--minor-grid-size),
                var(--minor-grid-size) var(--minor-grid-size),
                var(--major-grid-size) var(--major-grid-size),
                var(--major-grid-size) var(--major-grid-size),
                100% 100%,
                100% 100%;
            background-position:
                var(--minor-offset-x) var(--minor-offset-y),
                var(--minor-offset-x) var(--minor-offset-y),
                var(--major-offset-x) var(--major-offset-y),
                var(--major-offset-x) var(--major-offset-y),
                center center,
                center center;
            transition: background-color 0.3s, background-image 0.3s;
        }

        #canvas-stage.panning {
            cursor: grabbing;
        }

        #canvas-stage.grid-hidden {
            background-image:
                radial-gradient(circle at 18% 12%, var(--grid-glow), transparent 28%),
                radial-gradient(circle at 82% 18%, rgba(255, 255, 255, 0.04), transparent 24%);
            background-size: 100% 100%, 100% 100%;
            background-position: center center, center center;
        }

        #lasso {
            position: absolute;
            border: 1px solid var(--accent);
            background: rgba(0, 123, 255, 0.1);
            pointer-events: none;
            display: none;
            z-index: 10000;
        }

        #toolbar-container {
            position: fixed;
            top: 20px;
            left: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            z-index: 1000;
        }

        #toolbar-container.menu-open {
            z-index: 6000;
        }

        #toolbar,
        .zoom-controls {
            display: flex;
            align-items: center;
            background: var(--toolbar-bg);
            padding: 10px 15px;
            border-radius: 12px;
            backdrop-filter: blur(8px);
            box-shadow: 0 4px 20px var(--shadow);
            border: 1px solid rgba(0, 0, 0, 0.05);
            gap: 12px;
        }

        #toolbar {
            position: relative;
        }

        @media (max-width: 1024px) {
            #toolbar-container {
                top: auto;
                bottom: 20px;
                left: 10px;
                right: 10px;
                flex-direction: column-reverse;
                gap: 10px;
            }

            #toolbar {
                flex-wrap: wrap;
                justify-content: center;
                width: 100%;
            }

            #profile-info {
                align-self: center;
            }
        }

        @media (max-width: 640px) {
            #toolbar-container {
                left: 12px;
                right: 12px;
                bottom: 12px;
                gap: 8px;
            }

            #toolbar,
            .zoom-controls,
            #profile-info {
                width: 100%;
                box-sizing: border-box;
            }

            #toolbar {
                display: grid;
                grid-template-columns: 48px minmax(0, 1fr) 48px;
                align-items: center;
                gap: 8px;
                padding: 12px;
            }

            #toolbar button {
                width: 48px;
                height: 48px;
                min-width: 48px;
                padding: 0;
                justify-content: center;
            }

            #toolbar .btn-label {
                display: inline;
            }

            #toolbar select {
                min-width: 0;
                height: 48px;
                padding: 10px 12px;
                width: 100%;
            }

            #toolbar .toolbar-secondary {
                display: none;
            }

            #toolbar .toolbar-primary {
                grid-column: 1;
            }

            #toolbar .toolbar-primary .btn-label {
                display: none;
            }

            #toolbar .more-menu-container {
                display: flex;
                grid-column: 3;
                justify-content: flex-end;
                align-items: center;
            }

            #toolbar .more-menu-trigger {
                display: flex;
                align-items: center;
                justify-content: center;
                width: 48px;
                height: 48px;
                min-width: 48px;
                padding: 0;
            }

            #toolbar .more-menu-panel {
                width: min(240px, calc(100vw - 32px));
            }

            #toolbar .more-menu-panel button {
                width: 100%;
                min-width: 0;
                height: auto;
                padding: 12px 14px;
                justify-content: flex-start;
            }

            #toolbar .more-menu-panel .btn-label {
                display: inline;
            }

            #profile-info {
                justify-content: center;
                padding: 10px 12px;
            }

            #profile-info span {
                max-width: 140px;
                overflow: hidden;
                text-overflow: ellipsis;
                white-space: nowrap;
            }

            .zoom-controls {
                justify-content: space-between;
                padding: 10px 12px;
            }
        }

        button,
        select {
            padding: 10px 16px;
            border-radius: 8px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 8px;
            white-space: nowrap;
        }

        .btn-label {
            display: inline;
        }

        .more-menu-container {
            position: relative;
            display: none;
        }

        .more-menu-panel {
            position: absolute;
            right: 0;
            bottom: calc(100% + 10px);
            width: 220px;
            max-width: min(280px, calc(100vw - 24px));
            max-height: min(360px, calc(100vh - 24px));
            padding: 8px;
            border-radius: 14px;
            border: 1px solid var(--border-color);
            background: var(--toolbar-bg);
            box-shadow: 0 18px 45px var(--shadow);
            backdrop-filter: blur(12px);
            display: none;
            flex-direction: column;
            gap: 6px;
            overflow-y: auto;
            z-index: 7000;
            opacity: 0;
            transform: translateY(8px) scale(0.96);
            transform-origin: bottom right;
            transition: opacity 0.18s ease, transform 0.18s ease;
        }

        .more-menu-panel.open {
            display: flex;
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .more-menu-item {
            width: 100%;
            justify-content: flex-start;
            text-align: left;
        }

        .btn-main {
            background: var(--primary-btn);
            color: white;
        }

        .btn-sub {
            background: var(--card-bg);
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }

        .btn-danger {
            background: var(--card-bg);
            color: var(--danger);
            border: 1px solid var(--danger);
        }

        .btn-danger:hover {
            background: var(--danger);
            color: #ffffff;
        }

        .task-card {
            position: absolute;
            width: 240px;
            min-height: 160px;
            background: var(--card-bg);
            border-radius: 12px;
            padding: 15px;
            box-sizing: border-box;
            cursor: grab;
            box-shadow: 0 4px 15px var(--shadow);
            display: flex;
            flex-direction: column;
            border-left: 8px solid var(--accent);
            user-select: none;
            overflow: hidden;
            touch-action: none;
            transition: left 0.3s ease-out, top 0.3s ease-out, width 0.3s ease-out, height 0.3s ease-out;
            /* Smooth Figma-style sync */
        }

        /* Disable transitions while dragging so it doesn't feel laggy */
        .task-card.dragging {
            transition: none !important;
            z-index: 5000;
        }

        .task-card.selected {
            outline: 2px solid var(--accent);
            box-shadow: 0 0 10px var(--accent);
        }

        .title-input {
            background: transparent;
            border: none;
            font-weight: bold;
            font-size: 18px;
            margin-bottom: 8px;
            outline: none;
            width: 100%;
            color: var(--text-main);
        }

        .task-textarea {
            background: transparent;
            border: none;
            resize: none;
            font-size: 14px;
            color: var(--text-sub);
            outline: none;
            width: 100%;
            flex: 1;
            line-height: 1.5;
        }

        .card-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: auto;
            padding-top: 10px;
            border-top: 1px solid var(--grid-color);
        }

        .resizer {
            width: 25px;
            height: 25px;
            border-radius: 0 0 12px 0;
            background: linear-gradient(135deg, transparent 50%, var(--border-color) 50%);
            position: absolute;
            right: 0;
            bottom: 0;
            cursor: nwse-resize;
        }

        .color-picker {
            border: none;
            width: 24px;
            height: 24px;
            cursor: pointer;
            background: none;
        }

        .delete-btn {
            color: var(--danger);
            font-size: 11px;
            font-weight: bold;
            cursor: pointer;
        }

        .zoom-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--card-bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border-color);
            cursor: pointer;
        }

        .zoom-level {
            min-width: 58px;
            text-align: center;
            font-size: 13px;
            font-weight: 700;
            color: var(--text-sub);
            letter-spacing: 0.04em;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: var(--canvas-size);
            height: var(--canvas-size);
            background: transparent;
            transform-origin: 0 0;
            transition: transform 0.12s ease-out;
        }

        /* Sync Indicator */
        #sync-status {
            position: fixed;
            bottom: 20px;
            right: 20px;
            font-size: 12px;
            color: var(--text-sub);
            opacity: 0.6;
            z-index: 2000;
            pointer-events: none;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }

        .modal-box {
            background: var(--card-bg);
            padding: 25px;
            border-radius: 16px;
            width: 350px;
            text-align: center;
            border: 1px solid var(--border-color);
        }

        .modal-input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: var(--bg-color);
            color: var(--text-main);
            display: none;
            box-sizing: border-box;
        }
    </style>
</head>

<body onmousedown="initLasso(event)">

    <div id="lasso"></div>
    <div id="sync-status">Cloud Ready</div>

    <div id="modalOverlay" class="modal-overlay">
        <div class="modal-box">
            <h3 id="modalTitle">Confirm Action</h3>
            <p id="modalMessage"></p>
            <input type="text" id="modalInput" class="modal-input">
            <div style="display:flex; justify-content:center; gap:12px;">
                <button class="btn-sub" onclick="handleModalResponse(false)">Cancel</button>
                <button id="modalConfirmBtn" class="btn-main" onclick="handleModalResponse(true)">Confirm</button>
            </div>
        </div>
    </div>

    <div id="toolbar-container">
        <div class="zoom-controls" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <button class="zoom-btn" onclick="applyZoom(0.1)"><i class="bi bi-plus-lg"></i></button>
            <button class="zoom-btn" onclick="applyZoom(-0.1)"><i class="bi bi-dash-lg"></i></button>
            <span id="zoomLevel" class="zoom-level">100%</span>
            <button class="zoom-btn" onclick="fitToContent()" title="Fit Tasks"><i class="bi bi-bounding-box"></i></button>
            <button class="zoom-btn" style="font-size: 12px;"
                onclick="resetZoom()">1:1</button>
        </div>

        <div id="toolbar" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <button class="btn-main toolbar-primary" onclick="createTask()" aria-label="Add Task" title="Add Task"><i class="bi bi-plus-lg"></i><span class="btn-label">Add Task</span></button>
            <select id="userSelect"></select>
            <button class="btn-sub toolbar-secondary" onclick="addUser()" aria-label="Add Workspace" title="Add Workspace"><i class="bi bi-person-plus"></i><span class="btn-label">Workspace</span></button>
            <button class="btn-sub toolbar-secondary" onclick="editUser()" aria-label="Rename Workspace" title="Rename Workspace"><i class="bi bi-pencil-square"></i><span class="btn-label">Rename</span></button>
            <button class="btn-danger toolbar-secondary" onclick="deleteUser()" aria-label="Delete Workspace" title="Delete Workspace"><i class="bi bi-trash3"></i><span class="btn-label">Delete</span></button>
            <button id="gridToggle" class="btn-sub toolbar-secondary" onclick="toggleGrid()" aria-label="Toggle Grid" title="Toggle Grid"><i id="gridIcon"
                class="bi bi-grid-3x3-gap-fill"></i><span class="btn-label">Grid</span></button>
            <button id="themeToggle" class="btn-sub toolbar-secondary" onclick="toggleTheme()" aria-label="Toggle Theme" title="Toggle Theme"><i id="themeIcon"
                    class="bi bi-sun-fill"></i></button>
            <button class="btn-danger toolbar-secondary" onclick="logout()" aria-label="Logout" title="Logout"><i class="bi bi-box-arrow-right"></i><span class="btn-label">Logout</span></button>
            <div class="more-menu-container" onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
                <button id="moreMenuTrigger" class="btn-sub more-menu-trigger" onclick="toggleMoreMenu()" aria-label="More Actions" title="More Actions">
                    <i class="bi bi-three-dots"></i>
                </button>
                <div id="moreMenuPanel" class="more-menu-panel">
                    <button class="btn-sub more-menu-item" onclick="closeMoreMenu(); addUser();"><i class="bi bi-person-plus"></i><span class="btn-label">Workspace</span></button>
                    <button class="btn-sub more-menu-item" onclick="closeMoreMenu(); editUser();"><i class="bi bi-pencil-square"></i><span class="btn-label">Rename</span></button>
                    <button class="btn-danger more-menu-item" onclick="closeMoreMenu(); deleteUser();"><i class="bi bi-trash3"></i><span class="btn-label">Delete</span></button>
                    <button class="btn-sub more-menu-item" onclick="closeMoreMenu(); toggleGrid();"><i class="bi bi-grid-3x3-gap-fill"></i><span class="btn-label">Grid</span></button>
                    <button class="btn-sub more-menu-item" onclick="closeMoreMenu(); toggleTheme();"><i class="bi bi-moon-stars-fill"></i><span class="btn-label">Theme</span></button>
                    <button class="btn-danger more-menu-item" onclick="closeMoreMenu(); logout();"><i class="bi bi-box-arrow-right"></i><span class="btn-label">Logout</span></button>
                </div>
            </div>
        </div>
        <div id="profile-info"
            style="display: flex; align-items: center; gap: 8px; padding: 10px 15px; background: var(--toolbar-bg); border-radius: 12px; border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 4px 20px var(--shadow);"
            onmousedown="event.stopPropagation()" ontouchstart="event.stopPropagation()">
            <i class="bi bi-person-circle" style="font-size: 1.2rem; color: var(--accent);"></i>
            <span id="display-username" style="font-weight: 600; font-size: 14px; color: var(--text-main);">User</span>
        </div>
    </div>

    <div id="canvas-stage">
        <div id="canvas"></div>
    </div>

    <script>
        const gridSize = 40;
        const canvas = document.getElementById('canvas');
        const canvasStage = document.getElementById('canvas-stage');
        const userSelect = document.getElementById('userSelect');
        const lasso = document.getElementById('lasso');
        const statusEl = document.getElementById('sync-status');
        const zoomLevelEl = document.getElementById('zoomLevel');
        const gridIconEl = document.getElementById('gridIcon');
        const moreMenuPanel = document.getElementById('moreMenuPanel');
        const moreMenuTrigger = document.getElementById('moreMenuTrigger');
        const API_URL = "https://script.google.com/macros/s/AKfycbwXb7C07DXX2l7t6bCFyA4LBHS4G8VI1-U1SoVMuEGXdRndQCDRt3kOwCuCWmy6mUMihA/exec";
        const loggedInUser = localStorage.getItem("currentUser");

        let modalResolver = null;
        let scale = 1;
        let panX = 0;
        let panY = 0;
        let isSpacePressed = false;
        let isPanning = false;
        let showGrid = localStorage.getItem('showGrid') !== 'false';
        let touchGesture = null;
        let selectedTasks = new Set();
        let currentUser = 'Personal';
        let allUserData = { 'Personal': [] };

        // --- TIMESTAMP GUARD VARIABLES ---
        let lastLocalUpdate = 0;

        function positiveModulo(value, divisor) {
            return ((value % divisor) + divisor) % divisor;
        }

        function updateGridBackground() {
            canvasStage.classList.toggle('grid-hidden', !showGrid);
            gridIconEl.className = showGrid ? 'bi bi-grid-3x3-gap-fill' : 'bi bi-grid-3x3-gap';
            if (!showGrid) return;

            const minor = Math.max(gridSize * scale, 12);
            const major = minor * 5;
            canvasStage.style.setProperty('--minor-grid-size', `${minor}px`);
            canvasStage.style.setProperty('--major-grid-size', `${major}px`);
            canvasStage.style.setProperty('--minor-offset-x', `${positiveModulo(panX, minor)}px`);
            canvasStage.style.setProperty('--minor-offset-y', `${positiveModulo(panY, minor)}px`);
            canvasStage.style.setProperty('--major-offset-x', `${positiveModulo(panX, major)}px`);
            canvasStage.style.setProperty('--major-offset-y', `${positiveModulo(panY, major)}px`);
        }

        function applyViewport() {
            canvas.style.transform = `translate(${panX}px, ${panY}px) scale(${scale})`;
            zoomLevelEl.textContent = `${Math.round(scale * 100)}%`;
            updateGridBackground();
        }

        function setCanvasScale(nextScale, originX = window.innerWidth / 2, originY = window.innerHeight / 2) {
            const boundedScale = Math.min(Math.max(0.3, nextScale), 3);
            const worldX = (originX - panX) / scale;
            const worldY = (originY - panY) / scale;
            scale = boundedScale;
            panX = originX - (worldX * scale);
            panY = originY - (worldY * scale);
            applyViewport();
        }

        function screenToCanvas(clientX, clientY) {
            const rect = canvasStage.getBoundingClientRect();
            return {
                x: clientX - rect.left,
                y: clientY - rect.top
            };
        }

        function canStartPan(target) {
            return !target.closest('#toolbar-container, .task-card, .modal-overlay, .modal-box');
        }

        function startCanvasPan(e) {
            const wantsPan = e.button === 1 || (e.button === 0 && isSpacePressed);
            if (!wantsPan || !canStartPan(e.target)) return;
            e.preventDefault();
            isPanning = true;
            canvasStage.classList.add('panning');
            let lastX = e.clientX;
            let lastY = e.clientY;

            const onMove = (moveEvent) => {
                panX += moveEvent.clientX - lastX;
                panY += moveEvent.clientY - lastY;
                lastX = moveEvent.clientX;
                lastY = moveEvent.clientY;
                applyViewport();
            };

            const onEnd = () => {
                isPanning = false;
                canvasStage.classList.remove('panning');
                document.removeEventListener('mousemove', onMove);
                document.removeEventListener('mouseup', onEnd);
            };

            document.addEventListener('mousemove', onMove);
            document.addEventListener('mouseup', onEnd);
        }

        function handleWheelZoom(e) {
            if (e.target.closest('#toolbar-container, .modal-overlay, .modal-box')) return;
            e.preventDefault();
            const pointer = screenToCanvas(e.clientX, e.clientY);
            const delta = e.deltaY < 0 ? 0.1 : -0.1;
            setCanvasScale(scale + delta, pointer.x, pointer.y);
        }

        function toggleGrid() {
            showGrid = !showGrid;
            localStorage.setItem('showGrid', showGrid);
            updateGridBackground();
        }

        function closeMoreMenu() {
            moreMenuPanel.classList.remove('open');
            moreMenuTrigger.setAttribute('aria-expanded', 'false');
            document.getElementById('toolbar-container').classList.remove('menu-open');
        }

        function positionMoreMenu() {
            const menuMargin = 12;

            moreMenuPanel.style.left = 'auto';
            moreMenuPanel.style.right = '0';
            moreMenuPanel.style.top = 'auto';
            moreMenuPanel.style.bottom = 'calc(100% + 10px)';
            moreMenuPanel.style.transformOrigin = 'bottom right';

            const triggerRect = moreMenuTrigger.getBoundingClientRect();
            const parentRect = moreMenuTrigger.parentElement.getBoundingClientRect();
            const panelRect = moreMenuPanel.getBoundingClientRect();
            const viewportWidth = window.innerWidth;
            const viewportHeight = window.innerHeight;

            const spaceAbove = triggerRect.top - menuMargin;
            const spaceBelow = viewportHeight - triggerRect.bottom - menuMargin;
            const shouldOpenDown = spaceAbove < panelRect.height && spaceBelow > spaceAbove;
            const shouldAlignLeft = triggerRect.right - panelRect.width < menuMargin && triggerRect.left + panelRect.width <= viewportWidth - menuMargin;

            if (shouldOpenDown) {
                moreMenuPanel.style.top = 'calc(100% + 10px)';
                moreMenuPanel.style.bottom = 'auto';
                moreMenuPanel.style.transformOrigin = shouldAlignLeft ? 'top left' : 'top right';
            }

            if (shouldAlignLeft) {
                moreMenuPanel.style.left = '0';
                moreMenuPanel.style.right = 'auto';
            }

            const adjustedRect = moreMenuPanel.getBoundingClientRect();
            const overflowRight = adjustedRect.right - (viewportWidth - menuMargin);
            const overflowLeft = menuMargin - adjustedRect.left;
            const overflowBottom = adjustedRect.bottom - (viewportHeight - menuMargin);
            const overflowTop = menuMargin - adjustedRect.top;

            if (overflowRight > 0) {
                const nextLeft = (shouldAlignLeft ? 0 : parentRect.width - adjustedRect.width) - overflowRight;
                moreMenuPanel.style.left = `${nextLeft}px`;
                moreMenuPanel.style.right = 'auto';
            }

            if (overflowLeft > 0) {
                moreMenuPanel.style.left = `${overflowLeft}px`;
                moreMenuPanel.style.right = 'auto';
            }

            if (overflowBottom > 0) {
                const nextTop = (shouldOpenDown ? parentRect.height + 10 : -adjustedRect.height - 10) - overflowBottom;
                moreMenuPanel.style.top = `${nextTop}px`;
                moreMenuPanel.style.bottom = 'auto';
            }

            if (overflowTop > 0) {
                moreMenuPanel.style.top = `${overflowTop}px`;
                moreMenuPanel.style.bottom = 'auto';
            }
        }

        function toggleMoreMenu() {
            const isOpen = moreMenuPanel.classList.toggle('open');
            moreMenuTrigger.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
            document.getElementById('toolbar-container').classList.toggle('menu-open', isOpen);
            if (isOpen) positionMoreMenu();
        }

        function canStartTouchViewport(target) {
            return !target.closest('#toolbar-container, .modal-overlay, .modal-box, input, textarea, select, button');
        }

        function getTouchDistance(touchA, touchB) {
            return Math.hypot(touchB.clientX - touchA.clientX, touchB.clientY - touchA.clientY);
        }

        function getTouchCenter(touchA, touchB) {
            return {
                x: (touchA.clientX + touchB.clientX) / 2,
                y: (touchA.clientY + touchB.clientY) / 2
            };
        }

        function handleStageTouchStart(e) {
            if (!canStartTouchViewport(e.target)) return;

            if (e.touches.length === 1) {
                touchGesture = {
                    type: 'pan',
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
                canvasStage.classList.add('panning');
                return;
            }

            if (e.touches.length === 2) {
                const center = getTouchCenter(e.touches[0], e.touches[1]);
                const localCenter = screenToCanvas(center.x, center.y);
                touchGesture = {
                    type: 'pinch',
                    startScale: scale,
                    startPanX: panX,
                    startPanY: panY,
                    distance: getTouchDistance(e.touches[0], e.touches[1]),
                    centerX: localCenter.x,
                    centerY: localCenter.y
                };
                canvasStage.classList.add('panning');
            }
        }

        function handleStageTouchMove(e) {
            if (!touchGesture) return;

            if (touchGesture.type === 'pan' && e.touches.length === 1) {
                e.preventDefault();
                const nextTouch = e.touches[0];
                panX += nextTouch.clientX - touchGesture.x;
                panY += nextTouch.clientY - touchGesture.y;
                touchGesture.x = nextTouch.clientX;
                touchGesture.y = nextTouch.clientY;
                applyViewport();
                return;
            }

            if (touchGesture.type === 'pinch' && e.touches.length === 2) {
                e.preventDefault();
                const nextCenter = getTouchCenter(e.touches[0], e.touches[1]);
                const localCenter = screenToCanvas(nextCenter.x, nextCenter.y);
                const nextDistance = getTouchDistance(e.touches[0], e.touches[1]);
                const nextScale = Math.min(Math.max(0.3, touchGesture.startScale * (nextDistance / touchGesture.distance)), 3);
                const worldX = (touchGesture.centerX - touchGesture.startPanX) / touchGesture.startScale;
                const worldY = (touchGesture.centerY - touchGesture.startPanY) / touchGesture.startScale;

                scale = nextScale;
                panX = localCenter.x - (worldX * scale);
                panY = localCenter.y - (worldY * scale);
                applyViewport();
            }
        }

        function handleStageTouchEnd(e) {
            if (e.touches.length === 0) {
                touchGesture = null;
                if (!isSpacePressed && !isPanning) canvasStage.classList.remove('panning');
                return;
            }

            if (e.touches.length === 1) {
                touchGesture = {
                    type: 'pan',
                    x: e.touches[0].clientX,
                    y: e.touches[0].clientY
                };
            }
        }

        function checkAuth() {
            if (!loggedInUser) { window.location.href = "login.html"; return false; }
            return true;
        }

        function logout() {
            localStorage.clear();
            window.location.href = "login.html";
        }

        // --- LASSO (Selection Logic) ---
        function initLasso(e) {
            if (e.button !== 0 || isSpacePressed || isPanning) return;
            if (e.target !== document.body && e.target !== canvas && e.target !== canvasStage) return;
            if (!e.shiftKey) {
                selectedTasks.forEach(id => {
                    const el = document.querySelector(`[data-id="${id}"]`);
                    if (el) el.classList.remove('selected');
                });
                selectedTasks.clear();
            }
            const startX = e.clientX; const startY = e.clientY;
            lasso.style.display = 'block'; lasso.style.width = '0px'; lasso.style.height = '0px';

            function onMouseMove(moveEvent) {
                const currentX = moveEvent.clientX; const currentY = moveEvent.clientY;
                const left = Math.min(startX, currentX); const top = Math.min(startY, currentY);
                const width = Math.abs(currentX - startX); const height = Math.abs(currentY - startY);
                lasso.style.left = left + 'px'; lasso.style.top = top + 'px';
                lasso.style.width = width + 'px'; lasso.style.height = height + 'px';
                document.querySelectorAll('.task-card').forEach(card => {
                    const rect = card.getBoundingClientRect();
                    const cardId = parseInt(card.dataset.id);
                    const isInside = (rect.left < left + width && rect.left + rect.width > left && rect.top < top + height && rect.top + rect.height > top);
                    if (isInside) { card.classList.add('selected'); selectedTasks.add(cardId); }
                    else if (!e.shiftKey) { card.classList.remove('selected'); selectedTasks.delete(cardId); }
                });
            }
            function onMouseUp() { lasso.style.display = 'none'; document.removeEventListener('mousemove', onMouseMove); document.removeEventListener('mouseup', onMouseUp); }
            document.addEventListener('mousemove', onMouseMove); document.addEventListener('mouseup', onMouseUp);
        }

        // --- MODAL ---
        async function showModal({ title, message, type = 'confirm', defaultValue = "" }) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalMessage').innerText = message || "";
            const input = document.getElementById('modalInput');
            input.value = defaultValue; input.style.display = (type === 'prompt') ? 'block' : 'none';
            document.getElementById('modalConfirmBtn').className = (type === 'danger') ? 'btn-danger' : 'btn-main';
            document.getElementById('modalOverlay').style.display = 'flex';
            return new Promise(r => modalResolver = r);
        }
        function handleModalResponse(confirmed) {
            document.getElementById('modalOverlay').style.display = 'none';
            if (!confirmed) return modalResolver(null);
            modalResolver(document.getElementById('modalInput').style.display === 'block' ? document.getElementById('modalInput').value : true);
        }

        // --- TASKS ---
        function createTask() {
            const id = Date.now();
            const newTask = { id, title: 'New Task', desc: 'Details...', color: '#007bff', x: 120, y: 120, w: 240, h: 160 };
            if (!allUserData[currentUser]) allUserData[currentUser] = [];
            allUserData[currentUser].push(newTask);
            renderTask(newTask);
            saveAllAndSync();
        }

        function renderTask(task) {
            const card = document.createElement('div');
            card.className = 'task-card';
            card.style.left = task.x + 'px'; card.style.top = task.y + 'px';
            card.style.width = (task.w || 240) + 'px'; card.style.height = (task.h || 160) + 'px';
            card.style.borderLeftColor = task.color;
            card.dataset.id = task.id;
            card.innerHTML = `
            <input type="text" class="title-input" value="${task.title}" onchange="updateTask(${task.id}, 'title', this.value)">
            <textarea class="task-textarea" oninput="updateTask(${task.id}, 'desc', this.value)">${task.desc}</textarea>
            <div class="card-footer">
                <input type="color" class="color-picker" value="${task.color}" oninput="updateTask(${task.id}, 'color', this.value); this.closest('.task-card').style.borderLeftColor = this.value">
                <span class="delete-btn" onclick="deleteTask(${task.id})"><i class="bi bi-trash-fill"></i> REMOVE</span>
            </div>
            <div class="resizer"></div>`;
            canvas.appendChild(card);
            makeDraggable(card);
            makeResizable(card);
        }

        function makeResizable(card) {
            const resizer = card.querySelector('.resizer');
            const onStart = (e) => {
                if (isSpacePressed || e.button === 1) return;
                e.preventDefault(); e.stopPropagation();
                card.classList.add('dragging');
                const startX = e.clientX || e.touches[0].clientX;
                const startY = e.clientY || e.touches[0].clientY;
                const startW = card.offsetWidth; const startH = card.offsetHeight;
                const onMove = (me) => {
                    const curX = me.clientX || (me.touches ? me.touches[0].clientX : 0);
                    const curY = me.clientY || (me.touches ? me.touches[0].clientY : 0);
                    card.style.width = (startW + (curX - startX) / scale) + 'px';
                    card.style.height = (startH + (curY - startY) / scale) + 'px';
                };
                const onEnd = () => {
                    card.classList.remove('dragging');
                    let fw = Math.max(80, Math.round(card.offsetWidth / gridSize) * gridSize);
                    let fh = Math.max(80, Math.round(card.offsetHeight / gridSize) * gridSize);
                    card.style.width = fw + 'px'; card.style.height = fh + 'px';
                    updateTask(parseInt(card.dataset.id), 'size', { w: fw, h: fh });
                    document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onEnd);
                };
                document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
            };
            resizer.addEventListener('mousedown', onStart);
        }

        function makeDraggable(el) {
            let p1 = 0, p2 = 0, p3 = 0, p4 = 0;
            const onStart = (e) => {
                if (isSpacePressed || e.button === 1) return;
                if (['INPUT', 'TEXTAREA', 'SPAN', 'I'].includes(e.target.tagName) || e.target.className === 'resizer') return;
                const coords = e.touches ? { x: e.touches[0].clientX, y: e.touches[0].clientY } : { x: e.clientX, y: e.clientY };
                p3 = coords.x; p4 = coords.y;

                const dragItems = [];
                const elId = parseInt(el.dataset.id);
                if (!selectedTasks.has(elId)) {
                    document.querySelectorAll('.task-card').forEach(c => c.classList.remove('selected'));
                    selectedTasks.clear(); selectedTasks.add(elId); el.classList.add('selected');
                }

                selectedTasks.forEach(id => {
                    const itemEl = document.querySelector(`[data-id="${id}"]`);
                    if (itemEl) {
                        itemEl.classList.add('dragging');
                        dragItems.push({ el: itemEl, x: itemEl.offsetLeft, y: itemEl.offsetTop });
                    }
                });

                const onMove = (me) => {
                    const moveCoords = me.touches ? { x: me.touches[0].clientX, y: me.touches[0].clientY } : { x: me.clientX, y: me.clientY };
                    p1 = (p3 - moveCoords.x) / scale; p2 = (p4 - moveCoords.y) / scale;
                    p3 = moveCoords.x; p4 = moveCoords.y;
                    dragItems.forEach(item => { item.x -= p1; item.y -= p2; item.el.style.left = item.x + "px"; item.el.style.top = item.y + "px"; });
                };

                const onEnd = () => {
                    dragItems.forEach(item => {
                        item.el.classList.remove('dragging');
                        let fx = Math.round(item.el.offsetLeft / gridSize) * gridSize;
                        let fy = Math.round(item.el.offsetTop / gridSize) * gridSize;
                        item.el.style.left = fx + "px"; item.el.style.top = fy + "px";
                        updateTask(parseInt(item.el.dataset.id), 'pos', { x: fx, y: fy });
                    });
                    document.removeEventListener('mousemove', onMove); document.removeEventListener('mouseup', onEnd);
                };
                document.addEventListener('mousemove', onMove); document.addEventListener('mouseup', onEnd);
            };
            el.addEventListener('mousedown', onStart);
        }

        // --- SYNC & CORE LOGIC ---
        function updateTask(id, f, v) {
            if (!allUserData[currentUser]) return;
            const t = allUserData[currentUser].find(x => x.id === id);
            if (!t) return;
            if (f === 'pos') { t.x = v.x; t.y = v.y; }
            else if (f === 'size') { t.w = v.w; t.h = v.h; }
            else { t[f] = v; }
            saveAllAndSync();
        }

        function saveAllAndSync() {
            lastLocalUpdate = Date.now(); // Mark the time we touched the data
            localStorage.setItem('spatialTaskData', JSON.stringify(allUserData));
            localStorage.setItem('lastLocalUpdate', lastLocalUpdate);
            localStorage.setItem('lastUser', currentUser);
            syncToCloud(); // Trigger immediate upload
        }

        async function syncToCloud() {
            if (!loggedInUser) return;
            statusEl.innerText = "Syncing...";
            const dataString = JSON.stringify(allUserData);
            const url = `${API_URL}?action=updateTasks&username=${encodeURIComponent(loggedInUser)}&data=${encodeURIComponent(dataString)}&updated=${lastLocalUpdate}`;
            try {
                await fetch(url, { mode: 'no-cors' });
                statusEl.innerText = "Cloud Synced";
            } catch (e) {
                console.error("Sync Failed", e);
                statusEl.innerText = "Offline";
            }
        }

        async function syncFromCloud() {
            if (!loggedInUser) return;
            const url = `${API_URL}?action=getTasks&username=${encodeURIComponent(loggedInUser)}`;
            try {
                const response = await fetch(url);
                const result = await response.json();
                const cloudTimestamp = parseInt(result.updated) || 0;

                // TIMESTAMP GUARD: Only update if cloud is strictly newer than our last action
                if (result.data && result.data !== "{}" && cloudTimestamp > lastLocalUpdate) {
                    const cloudData = JSON.parse(result.data);

                    // Simple check if data is actually different
                    if (JSON.stringify(cloudData) !== JSON.stringify(allUserData)) {
                        console.log("Applying Cloud Updates...");
                        allUserData = cloudData;
                        lastLocalUpdate = cloudTimestamp; // Sync our clocks

                        const lastUsed = localStorage.getItem('lastUser');
                        currentUser = allUserData[lastUsed] ? lastUsed : Object.keys(allUserData)[0];

                        refreshCanvas();
                    }
                }
            } catch (e) { console.error("Fetch Failed", e); }
        }

        function refreshCanvas() {
            canvas.innerHTML = '';
            if (allUserData[currentUser]) allUserData[currentUser].forEach(renderTask);
            refreshUserDropdown();
        }

        async function deleteTask(id) {
            if (await showModal({ title: "Delete Task", message: "Discard card?", type: 'danger' })) {
                allUserData[currentUser] = allUserData[currentUser].filter(t => t.id !== id);
                document.querySelector(`[data-id="${id}"]`).remove();
                saveAllAndSync();
            }
        }

        // --- VIEW CONTROLS ---
        function applyZoom(delta) {
            setCanvasScale(scale + delta, window.innerWidth / 2, window.innerHeight / 2);
        }

        function fitToContent() {
            const tasks = allUserData[currentUser] || [];
            if (!tasks.length) {
                resetZoom();
                return;
            }

            const padding = 120;
            let minX = Infinity;
            let minY = Infinity;
            let maxX = -Infinity;
            let maxY = -Infinity;

            tasks.forEach(task => {
                const taskWidth = task.w || 240;
                const taskHeight = task.h || 160;
                minX = Math.min(minX, task.x);
                minY = Math.min(minY, task.y);
                maxX = Math.max(maxX, task.x + taskWidth);
                maxY = Math.max(maxY, task.y + taskHeight);
            });

            const boundsWidth = Math.max(maxX - minX, gridSize * 4);
            const boundsHeight = Math.max(maxY - minY, gridSize * 4);
            const viewportWidth = canvasStage.clientWidth;
            const viewportHeight = canvasStage.clientHeight;
            const nextScale = Math.min(
                Math.max(0.3, Math.min((viewportWidth - padding * 2) / boundsWidth, (viewportHeight - padding * 2) / boundsHeight)),
                2.2
            );

            scale = nextScale;
            panX = ((viewportWidth - (boundsWidth * scale)) / 2) - (minX * scale);
            panY = ((viewportHeight - (boundsHeight * scale)) / 2) - (minY * scale);
            applyViewport();
        }

        function resetZoom() {
            scale = 1;
            panX = 0;
            panY = 0;
            applyViewport();
        }

        function toggleTheme() {
            const target = document.documentElement.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
            document.documentElement.setAttribute('data-theme', target);
            localStorage.setItem('theme', target);
            document.getElementById('themeIcon').className = target === 'dark' ? 'bi bi-moon-stars-fill' : 'bi bi-sun-fill';
            updateGridBackground();
        }

        function refreshUserDropdown() {
            userSelect.innerHTML = '';
            Object.keys(allUserData).forEach(u => {
                const opt = document.createElement('option'); opt.value = u; opt.textContent = u;
                if (u === currentUser) opt.selected = true; userSelect.appendChild(opt);
            });
        }

        userSelect.onchange = (e) => {
            currentUser = e.target.value;
            refreshCanvas();
            saveAllAndSync();
        };

        async function addUser() {
            const n = await showModal({ title: "New Workspace", type: 'prompt' });
            if (n && !allUserData[n]) { allUserData[n] = []; currentUser = n; refreshCanvas(); saveAllAndSync(); }
        }

        async function editUser() {
            const n = await showModal({ title: "Rename Workspace", type: 'prompt', defaultValue: currentUser });
            if (n && n !== currentUser) {
                allUserData[n] = allUserData[currentUser]; delete allUserData[currentUser];
                currentUser = n; refreshUserDropdown(); saveAllAndSync();
            }
        }

        async function deleteUser() {
            if (Object.keys(allUserData).length <= 1) return;
            if (await showModal({ title: "Delete Workspace", type: 'danger' })) {
                delete allUserData[currentUser]; currentUser = Object.keys(allUserData)[0];
                refreshCanvas(); saveAllAndSync();
            }
        }

        window.onload = () => {
            if (!checkAuth()) return;
            
            const userDisplay = document.getElementById('display-username');
            if (userDisplay && loggedInUser) userDisplay.textContent = loggedInUser;
            

            if (localStorage.getItem('theme') === 'dark') toggleTheme();

            const cachedData = localStorage.getItem('spatialTaskData');
            const cachedTime = localStorage.getItem('lastLocalUpdate');

            if (cachedData) {
                allUserData = JSON.parse(cachedData);
                lastLocalUpdate = parseInt(cachedTime) || 0;
                currentUser = localStorage.getItem('lastUser') || Object.keys(allUserData)[0];
                refreshCanvas();
            }

            applyViewport();
            syncFromCloud();
        };

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space' && !['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) {
                isSpacePressed = true;
                canvasStage.classList.add('panning');
                e.preventDefault();
            }
        });

        document.addEventListener('keyup', (e) => {
            if (e.code === 'Space') {
                isSpacePressed = false;
                if (!isPanning) canvasStage.classList.remove('panning');
            }

            if (e.code === 'Escape') {
                closeMoreMenu();
            }
        });

        document.addEventListener('click', (e) => {
            if (!e.target.closest('.more-menu-container')) {
                closeMoreMenu();
            }
        });

        window.addEventListener('resize', () => {
            if (moreMenuPanel.classList.contains('open')) {
                positionMoreMenu();
            }
        });

        canvasStage.addEventListener('mousedown', startCanvasPan);
        canvasStage.addEventListener('wheel', handleWheelZoom, { passive: false });
        canvasStage.addEventListener('touchstart', handleStageTouchStart, { passive: true });
        canvasStage.addEventListener('touchmove', handleStageTouchMove, { passive: false });
        canvasStage.addEventListener('touchend', handleStageTouchEnd);
        canvasStage.addEventListener('touchcancel', handleStageTouchEnd);

        // SYNC INTERVALS
        setInterval(syncToCloud, 4000);   // Check/Push local changes every 4s
        setInterval(syncFromCloud, 2000); // Check for remote changes every 2s
    </script>
</body>
